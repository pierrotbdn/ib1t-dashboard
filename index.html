<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="IB1T DCA">
<title>IB1T DCA</title>
<style>
  :root{
    --bg:#090C14; --card:#111726; --card-2:#161D30; --line:#1F2A44;
    --text:#E7F3FF; --muted:#6C82A8; --muted-2:#3E4E6E;
    --accent:#00E5FF; --accent-glow:rgba(0,229,255,.45);
    --pink:#FF2E9A; --pink-glow:rgba(255,46,154,.4);
    --good:#39FF88; --good-glow:rgba(57,255,136,.4);
    --warn:#FFD23F; --warn-glow:rgba(255,210,63,.35);
    --bad:#FF3B5C; --bad-glow:rgba(255,59,92,.4);
    --sans:-apple-system,"SF Pro Text","Segoe UI",system-ui,sans-serif;
    --mono: "SF Mono","Courier New",ui-monospace,monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:
      radial-gradient(circle at 15% 0%, rgba(0,229,255,.09), transparent 45%),
      radial-gradient(circle at 100% 30%, rgba(255,46,154,.07), transparent 50%),
      var(--bg);
    color:var(--text); font-family:var(--sans); padding:16px 14px 60px;
  }
  .wrap{max-width:480px; margin:0 auto;}
  h1{
    font-weight:900; font-size:19px; margin:0; letter-spacing:.02em; text-transform:uppercase;
    background:linear-gradient(90deg,#FFB84D,#F7931A 70%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 10px rgba(247,147,26,.5));
  }
  .header-row{display:flex; align-items:center; gap:12px; margin-bottom:4px;}
  .btc-logo{width:44px; height:44px; border-radius:12px; background:linear-gradient(145deg,#F7931A,#E8850C); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; color:#fff; flex-shrink:0; box-shadow:0 0 18px rgba(247,147,26,.55), 0 0 2px rgba(247,147,26,.8) inset;}
  .btc-chip{display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:8px; background:linear-gradient(145deg,#F7931A,#E8850C); color:#fff; font-size:14px; font-weight:900; margin-right:9px; flex-shrink:0; box-shadow:0 0 10px rgba(247,147,26,.5);}
  .sub{color:var(--muted); font-size:11.5px; margin-bottom:16px; font-family:var(--mono); letter-spacing:.02em;}
  .card{
    background:linear-gradient(180deg, var(--card), var(--card-2));
    border:1px solid var(--line); border-radius:14px; padding:20px; margin-bottom:16px;
    box-shadow:0 0 0 1px rgba(0,229,255,.04) inset, 0 8px 24px rgba(0,0,0,.35);
    position:relative;
  }
  .card::before{
    content:""; position:absolute; top:0; left:16px; right:16px; height:1px;
    background:linear-gradient(90deg, transparent, var(--accent-glow), transparent);
  }

  .price-hero{display:flex; align-items:center; gap:20px;}
  .ring{position:relative; width:128px; height:128px; flex-shrink:0;}
  .ring svg{transform:rotate(-90deg); filter:drop-shadow(0 0 6px var(--accent-glow));}
  .ring-track{fill:none; stroke:#2A3752; stroke-width:9;}
  .ring-fill{fill:none; stroke:var(--accent); stroke-width:9; stroke-linecap:round; transition:stroke-dashoffset .5s;}
  .ring-label{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .ring-label .pct{font-weight:900; font-size:24px; font-family:var(--mono); color:#fff; text-shadow:0 0 10px var(--accent-glow);}
  .ring-label .txt{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-top:2px;}

  .price-main{flex:1;}
  .price-val{font-family:var(--mono); font-weight:800; font-size:40px; letter-spacing:-.01em; line-height:1; color:#fff; text-shadow:0 0 16px var(--accent-glow); display:flex; align-items:center;}
  .price-sub{font-size:10.5px; color:var(--muted); margin-top:6px; font-family:var(--mono); text-transform:uppercase; letter-spacing:.03em;}

  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px;}
  .progress-wrap{margin-top:14px;}
  .progress-track{height:8px; background:var(--card-2); border-radius:6px; overflow:hidden; border:1px solid var(--line);}
  .progress-fill{height:100%; background:linear-gradient(90deg,var(--pink),var(--accent)); box-shadow:0 0 10px var(--accent-glow);}
  .progress-label{display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-top:6px; font-family:var(--mono); text-transform:uppercase; letter-spacing:.04em;}

  .stat{background:var(--card-2); border:1px solid var(--line); border-radius:10px; padding:13px 14px;}
  .stat .label{font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; font-weight:700; font-family:var(--mono);}
  .stat .value{font-weight:800; font-size:17px; margin-top:5px; font-family:var(--mono); color:#fff;}
  .stat .value.pos{color:var(--bad); text-shadow:0 0 8px var(--bad-glow);}
  .stat .value.neg{color:var(--bad); text-shadow:0 0 8px var(--bad-glow);}

  .badge{display:flex; align-items:center; justify-content:center; gap:9px; padding:14px 16px; border-radius:10px; font-size:15px; font-weight:900; margin-top:16px; width:100%; text-transform:uppercase; letter-spacing:.04em; font-family:var(--mono); border:1px solid transparent;}
  .badge-dot{width:9px; height:9px; border-radius:50%; flex-shrink:0; animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.35;}}
  .badge-signal{background:rgba(57,255,136,.08); color:var(--good); border-color:rgba(57,255,136,.4); box-shadow:0 0 20px var(--good-glow), 0 0 0 1px rgba(57,255,136,.15) inset; text-shadow:0 0 10px var(--good-glow);}
  .badge-signal .badge-dot{background:var(--good); box-shadow:0 0 8px var(--good);}
  .badge-wait{background:var(--card-2); color:var(--muted); border-color:var(--line);}
  .badge-wait .badge-dot{background:var(--muted-2);}
  .badge-bad{background:rgba(255,59,92,.08); color:var(--bad); border-color:rgba(255,59,92,.4); box-shadow:0 0 20px var(--bad-glow); text-shadow:0 0 10px var(--bad-glow);}
  .badge-bad .badge-dot{background:var(--bad); box-shadow:0 0 8px var(--bad);}

  .btn{width:100%; padding:15px; border-radius:10px; border:1px solid transparent; font-size:14px; font-weight:800; cursor:pointer; margin-top:16px; text-transform:uppercase; letter-spacing:.04em; font-family:var(--mono);}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--pink)); color:#040610; box-shadow:0 0 24px var(--accent-glow);}
  .btn-primary:disabled{opacity:.4; box-shadow:none;}
  .btn-secondary{background:var(--card-2); color:var(--accent); border-color:rgba(0,229,255,.3);}

  h2{font-weight:900; font-size:13px; margin:0 0 18px; text-transform:uppercase; letter-spacing:.06em; color:var(--accent); text-shadow:0 0 8px var(--accent-glow);}
  .field{margin-bottom:18px;}
  .field label{display:block; font-size:10.5px; color:var(--muted); margin-bottom:8px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; font-family:var(--mono);}
  input{width:100%; padding:14px; border-radius:9px; border:1.5px solid var(--line); font-size:15px; font-family:var(--mono); background:var(--card-2); color:#fff;}
  input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,229,255,.12);}
  .row{display:flex; gap:14px; margin-bottom:18px;}
  .row > *{flex:1; min-width:0;}
  .row .field{margin-bottom:0;}
  input[type=date]{font-size:13px; padding:14px 8px; color-scheme:dark;}

  .chart-wrap{position:relative; height:150px; margin-top:26px; padding-bottom:20px;}
  .chart-empty{color:var(--muted-2); font-size:12.5px; text-align:center; padding:30px 0; font-style:italic;}
  .chart-val{position:absolute; transform:translate(-50%,-135%); font-size:10px; font-weight:800; color:var(--accent); background:var(--card-2); border:1px solid rgba(0,229,255,.25); padding:1px 6px; border-radius:5px; white-space:nowrap; font-family:var(--mono);}
  .chart-dates{position:absolute; left:0; right:0; bottom:0; height:16px;}
  .chart-datelabel{position:absolute; transform:translateX(-50%); font-size:9px; color:var(--muted); font-family:var(--mono); white-space:nowrap;}

  .hist-row{display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--line);}
  .hist-row:last-child{border-bottom:none;}
  .hist-dot{width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; box-shadow:0 0 8px var(--accent-glow);}
  .hist-main{flex:1;}
  .hist-parts{font-weight:800; font-size:13.5px; color:#fff; font-family:var(--mono);}
  .hist-sub{font-size:10.5px; color:var(--muted); margin-top:2px; font-family:var(--mono);}
  .hist-date{font-size:10.5px; color:var(--muted-2); font-family:var(--mono); white-space:nowrap;}
  .empty{color:var(--muted-2); font-size:13px; font-style:italic; text-align:center; padding:10px 0;}

  .setup{max-width:400px; margin:60px auto; text-align:left;}
  .setup p{color:var(--muted); font-size:13px;}
  .msg{font-size:12px; margin-top:8px; text-align:center; font-weight:700; font-family:var(--mono);}
  .msg.ok{color:var(--good);} .msg.err{color:var(--bad);}
  .footer-links{text-align:center; font-size:10.5px; color:var(--muted-2); margin-top:16px; font-family:var(--mono); text-transform:uppercase; letter-spacing:.05em;}
  .footer-links a{color:var(--muted); text-decoration:none; font-weight:700;}
  .demo-tag{display:inline-block; background:rgba(255,210,63,.12); color:var(--warn); border:1px solid rgba(255,210,63,.35); font-size:10px; font-weight:800; padding:4px 10px; border-radius:6px; margin-bottom:12px; text-transform:uppercase; letter-spacing:.05em; font-family:var(--mono);}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="setup" id="setup">
    <h1>Connecter ton dépôt</h1>
    <p>Token GitHub avec accès <b>Contents</b> (lecture/écriture) et <b>Actions</b> (lecture/écriture), limité à ce dépôt. Stocké uniquement sur cet appareil.</p>
    <div class="field"><label>Utilisateur GitHub</label><input type="text" id="owner" placeholder="pierrotbdn"></div>
    <div class="field"><label>Nom du dépôt</label><input type="text" id="repo" placeholder="ib1t-dca-bot"></div>
    <div class="field"><label>Token</label><input type="password" id="token" placeholder="github_pat_..."></div>
    <button class="btn btn-primary" id="connectBtn">Connecter</button>
    <div class="msg err" id="setupMsg"></div>
  </div>
  <div id="dashboard" style="display:none;"></div>
</div>

<script>
const ZONES = [
  {id:'LOW1',label:'LOW 1',start:'2026-07-12',end:'2026-08-15',target:-0.20,cartridges:[250]},
  {id:'MEDIUM1',label:'MEDIUM 1',start:'2026-08-16',end:'2026-10-19',target:-0.15,cartridges:[250,500]},
  {id:'HIGH',label:'HIGH',start:'2026-10-20',end:'2026-11-15',target:-0.10,cartridges:[250,500,750]},
  {id:'MEDIUM2',label:'MEDIUM 2',start:'2026-11-16',end:'2026-12-15',target:-0.10,cartridges:[250,500]},
  {id:'LOW2',label:'LOW 2',start:'2026-12-16',end:'2099-12-31',target:-0.10,cartridges:[250]}
];
const OBJECTIVE = 10000;
const WORKFLOW_FILE = 'ib1t-dca.yml';
const HOLIDAYS_2026 = ['2026-01-01','2026-04-03','2026-04-06','2026-05-01','2026-12-25'];
const EARLY_CLOSE_2026 = {'2026-12-24':[14,0], '2026-12-31':[14,0]};
let CFG = null;
let DEMO_STATE = null;

function parisNowParts(){
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone:'Europe/Paris', year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', hour12:false, weekday:'short'
  });
  const parts = {};
  fmt.formatToParts(new Date()).forEach(p => parts[p.type] = p.value);
  return parts;
}
function marketStatusNow(){
  const p = parisNowParts();
  const d = `${p.year}-${p.month}-${p.day}`;
  const mins = parseInt(p.hour)*60 + parseInt(p.minute);
  if(HOLIDAYS_2026.includes(d)) return {open:false, reason:"jour férié Euronext"};
  if(!['Mon','Tue','Wed','Thu','Fri'].includes(p.weekday)) return {open:false, reason:"week-end"};
  const close = EARLY_CLOSE_2026[d] ? EARLY_CLOSE_2026[d][0]*60+EARLY_CLOSE_2026[d][1] : 17*60+30;
  if(mins < 9*60 || mins > close) return {open:false, reason:`hors séance (9h00–${String(Math.floor(close/60)).padStart(2,'0')}h${String(close%60).padStart(2,'0')})`};
  return {open:true};
}

function todayStr(){
  return new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/Paris',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
}
function mondayKey(){
  const now=new Date(new Intl.DateTimeFormat('en-US',{timeZone:'Europe/Paris'}).format(new Date()));
  const wd=(now.getDay()+6)%7;
  now.setDate(now.getDate()-wd);
  return now.toISOString().slice(0,10);
}
function getZone(d){ for(const z of ZONES){ if(d>=z.start && d<=z.end) return z; } return ZONES[ZONES.length-1]; }
function fmtEur(x,dec=2){ return (x==null?0:x).toLocaleString('fr-FR',{minimumFractionDigits:dec,maximumFractionDigits:dec})+' €'; }
function fmtPct(x){ return x==null?'—':((x*100).toFixed(2).replace('.',',')+' %'); }
function fmtNum(x){ return Math.round(x||0).toLocaleString('fr-FR'); }

async function ghGetFile(){
  const res = await fetch(`https://api.github.com/repos/${CFG.owner}/${CFG.repo}/contents/state.json`, {
    headers:{Authorization:`token ${CFG.token}`, Accept:'application/vnd.github+json'}
  });
  if(!res.ok) throw new Error(`Lecture impossible (${res.status})`);
  const data = await res.json();
  const state = JSON.parse(decodeURIComponent(escape(atob(data.content))));
  return {state, sha: data.sha};
}
async function ghPutFile(newState, sha, message){
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(newState,null,2))));
  const res = await fetch(`https://api.github.com/repos/${CFG.owner}/${CFG.repo}/contents/state.json`, {
    method:'PUT',
    headers:{Authorization:`token ${CFG.token}`, Accept:'application/vnd.github+json'},
    body: JSON.stringify({message, content, sha})
  });
  if(!res.ok) throw new Error(`Écriture impossible (${res.status})`);
  return await res.json();
}
async function ghTriggerWorkflow(){
  const res = await fetch(`https://api.github.com/repos/${CFG.owner}/${CFG.repo}/actions/workflows/${WORKFLOW_FILE}/dispatches`, {
    method:'POST',
    headers:{Authorization:`token ${CFG.token}`, Accept:'application/vnd.github+json'},
    body: JSON.stringify({ref:'main'})
  });
  if(!res.ok) throw new Error(`Déclenchement impossible (${res.status})`);
}

function computeCartridge(zone, position, totalInvested, ask){
  for(const c of zone.cartridges){
    const nt=position+c, ni=totalInvested+ask*c, np=ni/nt, nd=ask/np-1;
    if(nd>=zone.target) return {chosen:c,newTotal:nt,newInvested:ni,newPru:np,newDd:nd};
  }
  const c=Math.max(...zone.cartridges);
  const nt=position+c, ni=totalInvested+ask*c, np=ni/nt, nd=ask/np-1;
  return {chosen:c,newTotal:nt,newInvested:ni,newPru:np,newDd:nd};
}

function shortDate(d){
  if(!d) return "";
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}`;
}
function renderChart(purchases, currentPru){
  const points = purchases.map(p=>({v:p.newPru, label: shortDate(p.date)}));
  points.push({v:currentPru, label:"aujourd'hui"});
  if(points.length<2) return '<div class="chart-empty">Pas encore assez d\u2019achats pour un graphique</div>';
  const series = points.map(p=>p.v);
  const w=100,h=64,pad=4;
  const min=Math.min(...series)*0.99, max=Math.max(...series)*1.01;
  const pts = points.map((p,i)=>{
    const x = pad + (i/(points.length-1))*(w-2*pad);
    const y = h-pad - ((p.v-min)/((max-min)||1))*(h-2*pad);
    return {x,y,...p};
  });
  const line = pts.map(p=>`${p.x},${p.y}`).join(' ');
  const area = `${pad},${h-pad} ` + line + ` ${w-pad},${h-pad}`;
  const valueLabels = pts.map(p=>`
    <div class="chart-val" style="left:${p.x}%; top:${(p.y/h*100)}%;">${fmtEur(p.v,2)}</div>
  `).join('');
  const dateLabels = pts.map(p=>`<div class="chart-datelabel" style="left:${p.x}%;">${p.label}</div>`).join('');
  return `<div class="chart-wrap">
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:100%;position:absolute;top:0;left:0;">
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
      </linearGradient></defs>
      <polygon points="${area}" fill="url(#g)"/>
      <polyline points="${line}" fill="none" stroke="#4F46E5" stroke-width="1.5" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>
      ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="1.6" fill="#4F46E5" vector-effect="non-scaling-stroke"/>`).join('')}
    </svg>
    ${valueLabels}
    <div class="chart-dates">${dateLabels}</div>
  </div>`;
}

function render(state, isDemo){
  const lc = state.lastChecked || {};
  const pru = state.totalInvested/state.position;
  const d = todayStr();
  const zone = getZone(d);
  const wk = mondayKey();
  const weekUsed = state.weekPurchasedKey === wk;
  const purchases = state.purchases||[];
  const pct = Math.min(100, state.position/OBJECTIVE*100);
  const r = 54, circ = 2*Math.PI*r;
  const dashOffset = circ - (pct/100)*circ;

  let signalHtml = `<div class="badge badge-wait"><span class="badge-dot"></span>Pas encore vérifié</div>`;
  let cartridgeStat = '';
  if(lc.error){
    signalHtml = `<div class="badge badge-bad"><span class="badge-dot"></span>DATA GAP</div>`;
  } else if(lc.price){
    const dd = lc.drawdown;
    const triggered = dd <= zone.target && !weekUsed && state.position < OBJECTIVE;
    if(triggered){
      const rec = computeCartridge(zone, state.position, state.totalInvested, lc.price);
      let chosen = rec.chosen;
      const remaining = OBJECTIVE - state.position;
      if(chosen>remaining) chosen=remaining;
      signalHtml = `<div class="badge badge-signal"><span class="badge-dot"></span>Signal — ${fmtNum(chosen)} parts à acheter</div>`;
      // coût indicatif retiré volontairement
    } else if(weekUsed){
      signalHtml = `<div class="badge badge-wait"><span class="badge-dot"></span>Achat déjà fait cette semaine</div>`;
    } else if(state.position>=OBJECTIVE){
      signalHtml = `<div class="badge badge-signal"><span class="badge-dot"></span>Objectif atteint 🎉</div>`;
    } else {
      signalHtml = `<div class="badge badge-wait"><span class="badge-dot"></span>Pas de signal pour l\u2019instant</div>`;
    }
  }

  document.getElementById('dashboard').innerHTML = `
    ${isDemo ? '<div class="demo-tag">MODE DÉMO — données fictives</div>' : ''}
    <div class="header-row">
      <div class="btc-logo">₿</div>
      <div>
        <h1>DCA ETF Bitcoin</h1>
        <div class="sub">${lc.date ? `${(lc.marketOpen ?? marketStatusNow().open) ? 'Prix en direct (séance)' : 'Dernier prix disponible (hors séance)'} — ${lc.date} ${lc.time||''}` : 'Aucune vérification enregistrée'}</div>
      </div>
    </div>

    <div class="card">
      <div class="price-hero">
        <div class="ring">
          <svg width="128" height="128" viewBox="0 0 128 128">
            <circle class="ring-track" cx="64" cy="64" r="${r}"/>
            <circle class="ring-fill" cx="64" cy="64" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${dashOffset}"/>
          </svg>
          <div class="ring-label"><div class="pct">${pct.toFixed(0)}%</div><div class="txt">objectif</div></div>
        </div>
        <div class="price-main">
          <div class="price-val">${lc.price ? fmtEur(lc.price,2) : '—'}</div>
          <div class="price-sub">Source : ${lc.source ? lc.source.split('(')[0].trim() : 'Prix IB1T'}</div>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat"><div class="label">PRU</div><div class="value">${fmtEur(pru,2)}</div></div>
        <div class="stat"><div class="label">Drawdown</div><div class="value" style="color:var(--accent); text-shadow:0 0 8px var(--accent-glow);">${fmtPct(lc.drawdown)}</div></div>
        <div class="stat"><div class="label">Investi total</div><div class="value">${fmtEur(state.totalInvested,0)}</div></div>
        <div class="stat"><div class="label">Zone</div><div class="value">${zone.label}</div></div>

      </div>
      ${signalHtml}
      <button class="btn btn-secondary" id="checkBtn">Vérifier maintenant</button>
      <div class="msg" id="checkMsg"></div>
    </div>

    <div class="card">
      <h2>Évolution du PRU</h2>
      ${renderChart(purchases, pru)}
    </div>

    <div class="card">
      <h2>Enregistrer un achat</h2>
      <div class="field"><label>Date</label><input type="date" id="bDate"></div>
      <div class="field"><label>Parts</label><input type="number" id="bParts" step="1"></div>
      <div class="field"><label>Prix tout inclus (€)</label><input type="number" id="bPrice" step="0.0001"></div>
      <div class="stat" style="margin-bottom:10px;">
        <div class="label">Montant débité (calculé)</div>
        <div class="value" id="bAmountDisplay">—</div>
      </div>
      <button class="btn btn-primary" id="buyBtn">Valider l\u2019achat</button>
      <div class="msg" id="buyMsg"></div>
    </div>

    <div class="card">
      <h2>Historique (${purchases.length})</h2>
      ${purchases.slice().reverse().map(p=>`
        <div class="hist-row">
          <div class="hist-dot"></div>
          <div class="hist-main">
            <div class="hist-parts">${fmtNum(p.parts)} parts @ ${fmtEur(p.price,2)}</div>
            <div class="hist-sub">PRU après : ${fmtEur(p.newPru,2)}</div>
          </div>
          <div class="hist-date">${p.date}</div>
        </div>
      `).join('')}
      <div class="hist-row">
        <div class="hist-dot" style="background:var(--muted-2);"></div>
        <div class="hist-main">
          <div class="hist-parts">Position initiale — 1 500 parts</div>
          <div class="hist-sub">PRU de départ : ${fmtEur(6.27,2)}</div>
        </div>
        <div class="hist-date">avant achats</div>
      </div>
    </div>

    <div class="footer-links"><a href="#" id="refreshLink">rafraîchir</a> &nbsp;·&nbsp; <a href="#" id="resetLink">changer de dépôt</a></div>
  `;

  document.getElementById('bDate').value = d;
  document.getElementById('bPrice').value = lc.price || '';
  function updateAmountDisplay(){
    const p = parseFloat(document.getElementById('bParts').value);
    const pr = parseFloat(document.getElementById('bPrice').value);
    const disp = document.getElementById('bAmountDisplay');
    disp.textContent = (p>0 && pr>0) ? fmtEur(p*pr) : '—';
  }
  document.getElementById('bParts').addEventListener('input', updateAmountDisplay);
  document.getElementById('bPrice').addEventListener('input', updateAmountDisplay);
  updateAmountDisplay();

  document.getElementById('refreshLink').onclick=(e)=>{e.preventDefault(); location.reload();};
  document.getElementById('resetLink').onclick=(e)=>{e.preventDefault(); localStorage.removeItem('ib1t-dash-config'); location.reload();};

  document.getElementById('checkBtn').onclick = async ()=>{
    const msg=document.getElementById('checkMsg');
    if(isDemo){
      msg.className='msg ok'; msg.textContent='Mode démo — en vrai, ce bouton relance une vérification réelle sur Boursorama.';
      return;
    }
    const btn=document.getElementById('checkBtn');
    const status = marketStatusNow();
    btn.disabled=true; btn.textContent='Vérification en cours…';
    msg.className='msg'; msg.textContent = status.open ? '' : `Marché fermé (${status.reason}) — le prix et le signal restent calculés normalement.`;
    try{
      await ghTriggerWorkflow();
      const before = lc.date+(lc.time||'');
      let found=false;
      const maxTries = 20; // ~100s, laisse le temps à la file d'attente + install + run
      for(let i=0;i<maxTries;i++){
        await new Promise(r=>setTimeout(r,5000));
        btn.textContent = `Vérification en cours… (${(i+1)*5}s)`;
        try{
          const {state:freshState} = await ghGetFile();
          const freshLc = freshState.lastChecked||{};
          if((freshLc.date+(freshLc.time||'')) !== before){ found=true; render(freshState,false); break; }
        }catch(inner){ /* ignore un raté ponctuel de lecture, on continue à réessayer */ }
      }
      if(!found){
        msg.className='msg err';
        msg.textContent="GitHub prend plus de temps que prévu (file d'attente Actions). Réessaie \u00abrafraîchir\u00bb en bas dans 1-2 minutes — la vérification a probablement quand même eu lieu.";
        btn.disabled=false; btn.textContent='Vérifier maintenant';
      }
    }catch(e){
      msg.className='msg err'; msg.textContent=e.message; btn.disabled=false; btn.textContent='Vérifier maintenant';
    }
  };

  document.getElementById('buyBtn').onclick = async ()=>{
    const btn=document.getElementById('buyBtn'); const msg=document.getElementById('buyMsg');
    const date=document.getElementById('bDate').value;
    const parts=parseFloat(document.getElementById('bParts').value);
    const price=parseFloat(document.getElementById('bPrice').value);
    const amount = (parts>0 && price>0) ? parts*price : NaN;
    if(!date||!parts||parts<=0||!price||price<=0||isNaN(amount)){
      msg.className='msg err'; msg.textContent='Remplis tous les champs.'; return;
    }
    if(weekUsed){ msg.className='msg err'; msg.textContent="Achat déjà confirmé cette semaine."; return; }
    if(state.position+parts>OBJECTIVE){ msg.className='msg err'; msg.textContent="Dépasse l\u2019objectif de 10 000 parts."; return; }

    if(isDemo){
      const newState = JSON.parse(JSON.stringify(state));
      const costBasis = price*parts;
      newState.totalInvested += costBasis;
      newState.position += parts;
      newState.weekPurchasedKey = wk;
      newState.purchases = newState.purchases||[];
      newState.purchases.push({date, parts, price, amount, newPru: newState.totalInvested/newState.position});
      DEMO_STATE = newState;
      render(newState, true);
      return;
    }

    btn.disabled=true; btn.textContent='Enregistrement…';
    try{
      const {state:freshState, sha} = await ghGetFile();
      const costBasis = price*parts;
      freshState.totalInvested += costBasis;
      freshState.position += parts;
      freshState.weekPurchasedKey = wk;
      freshState.purchases = freshState.purchases||[];
      freshState.purchases.push({date, parts, price, amount, newPru: freshState.totalInvested/freshState.position});
      await ghPutFile(freshState, sha, `Achat: ${parts} parts @ ${price}€`);
      render(freshState, false);
    }catch(e){
      msg.className='msg err'; msg.textContent=e.message; btn.disabled=false; btn.textContent="Valider l\u2019achat";
    }
  };
}

async function boot(){
  const saved = localStorage.getItem('ib1t-dash-config');
  if(saved){
    CFG = JSON.parse(saved);
    document.getElementById('setup').style.display='none';
    document.getElementById('dashboard').style.display='block';
    try{
      const {state} = await ghGetFile();
      render(state, false);
    }catch(e){
      document.getElementById('dashboard').innerHTML = `<div class="msg err">${e.message}</div><button class="btn btn-secondary" id="resetLink2">Reconfigurer</button>`;
      document.getElementById('resetLink2').onclick=()=>{localStorage.removeItem('ib1t-dash-config'); location.reload();};
    }
    return;
  }
  document.getElementById('connectBtn').onclick = async ()=>{
    const owner=document.getElementById('owner').value.trim();
    const repo=document.getElementById('repo').value.trim();
    const token=document.getElementById('token').value.trim();
    const msg=document.getElementById('setupMsg');
    if(!owner||!repo||!token){ msg.textContent='Remplis les 3 champs.'; return; }
    CFG={owner,repo,token};
    try{
      const {state} = await ghGetFile();
      localStorage.setItem('ib1t-dash-config', JSON.stringify(CFG));
      document.getElementById('setup').style.display='none';
      document.getElementById('dashboard').style.display='block';
      render(state, false);
    }catch(e){ msg.textContent=e.message; }
  };
}
boot();
</script>
</body>
</html>
